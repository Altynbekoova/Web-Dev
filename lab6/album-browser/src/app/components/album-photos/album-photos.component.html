<div class="photos-container">
    <div class="photos-header">
      <h1>Album Photos</h1>
      <button class="back-btn" (click)="goBack()">← Back to Album</button>
    </div>
  
    <div class="photos-grid">
      <div *ngFor="let photo of photos$ | async" class="photo-card">
        <img [src]="photo.thumbnailUrl" [alt]="photo.title" class="photo-img">
        <div class="photo-title">{{ photo.title }}</div>
      </div>
    </div>
  
    <div *ngIf="(photos$ | async)?.length === 0" class="no-photos">
      No photos found for this album.
    </div>
  </div>
